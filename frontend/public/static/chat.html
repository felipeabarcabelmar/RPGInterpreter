<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Conocimientos - CALEB SYSTEM</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border: var(--border-style);
            margin: 1rem 2rem 2rem 2rem;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            align-self: flex-end;
            background: var(--dark-blue);
            color: white;
            border-bottom-right-radius: 2px;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .ai-message {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-bottom-left-radius: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-input-area {
            padding: 1.5rem 2rem;
            background: rgba(0, 0, 0, 0.2);
            border-top: var(--border-style);
            display: flex;
            gap: 1rem;
        }

        #user-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 12px 20px;
            border-radius: 25px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }

        #user-input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: var(--accent-glow);
        }

        #send-btn {
            background: var(--neon-blue);
            color: var(--bg-dark);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        #send-btn:hover {
            box-shadow: var(--accent-glow);
            transform: scale(1.05);
        }

        .nav-header {
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: var(--border-style);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            margin-left: 3rem;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-dim);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--neon-blue);
            text-shadow: var(--accent-glow);
        }

        /* Markdown Styles in chat */
        .ai-message pre {
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ai-message code {
            font-family: 'Courier New', monospace;
            color: #ff9d00;
        }
    </style>
</head>

<body>
    <div class="app-container" style="flex-direction: column;">
        <header class="nav-header">
            <div class="logo-small" style="display: flex; align-items: center; gap: 10px;">
                <img src="/static/caleblogo.png" alt="Logo" style="width: 30px; height: 30px;">
                <span style="font-family: 'Orbitron', sans-serif; color: var(--neon-blue); font-size: 1.1rem;">CALEB
                    SYSTEM</span>
            </div>
            <nav class="nav-links">
                <a href="/" class="nav-link">Intérprete</a>
                <a href="/knowledge" class="nav-link active">Base de Conocimientos</a>
                <a href="/manage-categories" class="nav-link">Categorías</a>
            </nav>
        </header>

        <div class="filter-bar"
            style="padding: 10px 2rem; background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(0,212,255,0.1); display: flex; gap: 1rem; align-items: center;">
            <span style="font-size: 0.8rem; color: var(--text-dim); font-family: 'Orbitron', sans-serif;">Consultar
                sobre:</span>
            <select id="filter-type"
                style="background: #000; color: white; border: 1px solid var(--neon-blue); padding: 5px; border-radius: 4px; font-size: 0.8rem;">
                <option value="all">Todo el sistema</option>
                <option value="category">Por Categoría</option>
                <option value="file">Por Registro Específico</option>
            </select>
            <select id="filter-id"
                style="background: #000; color: white; border: 1px solid var(--neon-blue); padding: 5px; border-radius: 4px; font-size: 0.8rem; display: none;">
                <!-- Options dynamic -->
            </select>
        </div>

        <div class="chat-container">
            <div id="chat-window">
                <div class="message ai-message">
                    ¡Hola! Soy tu agente experto en AS/400. Puedo ayudarte a entender el código RPG que has subido. ¿Qué
                    quieres saber hoy?
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Pregunta sobre tus programas RPG..." autocomplete="off">
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Import Marked for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/chat.js"></script>
</body>

</html>
