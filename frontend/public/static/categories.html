<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenedor de Categorías - CALEB SYSTEM</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        .cat-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--panel-bg);
            border: var(--border-style);
            border-radius: 12px;
        }

        .cat-form {
            display: grid;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cat-list {
            display: grid;
            gap: 1rem;
        }

        .cat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 8px;
        }

        .cat-info h4 {
            color: var(--neon-blue);
            margin: 0 0 5px 0;
            font-family: 'Orbitron', sans-serif;
        }

        .cat-info p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .delete-cat {
            color: #ff4d4d;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px 10px;
        }

        .delete-cat:hover {
            color: #ff0000;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: white;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <header class="nav-header">
        <div class="logo-small" style="display: flex; align-items: center; gap: 10px;">
            <img src="/static/caleblogo.png" alt="Logo" style="width: 30px; height: 30px;">
            <span style="font-family: 'Orbitron', sans-serif; color: var(--neon-blue); font-size: 1.1rem;">CALEB
                SYSTEM</span>
        </div>
        <nav class="nav-links">
            <a href="/" class="nav-link">Intérprete</a>
            <a href="/knowledge" class="nav-link">Base de Conocimientos</a>
            <a href="/manage-categories" class="nav-link active">Categorías</a>
        </nav>
    </header>

    <div class="app-container" style="display: block; overflow-y: auto;">
        <div class="cat-container">
            <h2 style="font-family: 'Orbitron', sans-serif; color: var(--neon-blue); margin-bottom: 1.5rem;">Gestionar
                Categorías</h2>

            <form id="add-cat-form" class="cat-form">
                <input type="text" id="cat-name" placeholder="Nombre de la Categoría (p.ej. Ventas)" required>
                <textarea id="cat-desc" placeholder="Descripción opcional..."></textarea>
                <button type="submit" class="action-btn" style="width: fit-content;">Crear Categoría</button>
            </form>

            <div id="categories-list" class="cat-list">
                <!-- Categories will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        async function loadCategories() {
            const list = document.getElementById('categories-list');
            try {
                const response = await fetch('/categories');
                const categories = await response.json();
                list.innerHTML = '';
                categories.forEach(cat => {
                    const item = document.createElement('div');
                    item.className = 'cat-item';
                    item.innerHTML = `
                        <div class="cat-info">
                            <h4>${cat.name}</h4>
                            <p>${cat.description || 'Sin descripción'}</p>
                        </div>
                        <span class="delete-cat" onclick="deleteCategory(${cat.id})">&times;</span>
                    `;
                    list.appendChild(item);
                });
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function deleteCategory(id) {
            deleteCategoryId = id;
            document.getElementById('delete-modal').style.display = 'block';
        }

        let deleteCategoryId = null;
        document.getElementById('cancel-delete').onclick = () => {
            document.getElementById('delete-modal').style.display = 'none';
        }
        document.getElementById('confirm-delete').onclick = async () => {
            if (deleteCategoryId) {
                await fetch(`/categories/${deleteCategoryId}`, { method: 'DELETE' });
                document.getElementById('delete-modal').style.display = 'none';
                loadCategories();
            }
        }

        window.onclick = (event) => {
            const modal = document.getElementById('delete-modal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        };

        document.getElementById('add-cat-form').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('cat-name').value;
            const description = document.getElementById('cat-desc').value;

            await fetch('/categories', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description })
            });

            e.target.reset();
            loadCategories();
        };

        loadCategories();
    </script>

    <!-- Delete Modal -->
    <div id="delete-modal" class="modal">
        <div class="confirm-modal-content"
            style="background-color: #0d1117; margin: 15% auto; padding: 2.5rem; border: 1px solid #ff4d4d; border-radius: 12px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 30px rgba(255, 77, 77, 0.2); position: relative;">
            <h3 style="font-family: 'Orbitron', sans-serif; color: #ff4d4d; margin-bottom: 1.5rem;">¿Eliminar Categoría?
            </h3>
            <p style="color: var(--text-dim); margin-bottom: 2rem; line-height: 1.5;">Los archivos asociados quedarán
                "Sin Categoría". Esta acción no se puede deshacer.</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button type="button" id="cancel-delete" class="cancel-btn">Cancelar</button>
                <button type="button" id="confirm-delete" class="save-btn"
                    style="background: #ff4d4d;">Eliminar</button>
            </div>
        </div>
    </div>
</body>

</html>
